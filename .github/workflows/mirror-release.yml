name: Mirror release from haystack

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to mirror (e.g. v2.2.1)'
        required: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts from haystack
        env:
          GH_TOKEN: ${{ secrets.HAYSTACK_PAT }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TARGETS=(
            "aarch64-apple-darwin"
            "x86_64-apple-darwin"
            "aarch64-unknown-linux-musl"
            "x86_64-unknown-linux-musl"
          )
          mkdir -p dist
          for TARGET in "${TARGETS[@]}"; do
            FILE="ostk-${VERSION}-${TARGET}.tar.gz"
            ASC="${FILE}.asc"
            BASE="https://github.com/os-tack/haystack/releases/download/${VERSION}"
            curl -fsSL -H "Authorization: token ${GH_TOKEN}" "${BASE}/${FILE}" -o "dist/${FILE}"
            curl -fsSL -H "Authorization: token ${GH_TOKEN}" "${BASE}/${ASC}" -o "dist/${ASC}" || true
          done

      - name: Upload to existing release or create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/* --clobber
          else
            gh release create "${VERSION}" dist/* \
              --title "ostk ${VERSION}" \
              --notes "your os + tack — ${VERSION}

          Install:
          \`\`\`bash
          curl -fsSL https://ostk.ai/install | sh
          \`\`\`

          Verify:
          \`\`\`bash
          gpg --verify ostk-${VERSION}-aarch64-apple-darwin.tar.gz.asc
          \`\`\`

          See KEYS for signing key fingerprints."
          fi
