# ostk.toml — official v2.2.1 release configuration
# os-tack/ostk.ai — the distributed OS seed repository

[version]
release = "2.2.1"
kernel = ">=2.2.1, <2.3.0"
released_at = "2026-03-29T00:00:00Z"

[identity]
name = "@ostk.ai"
root_key = "6C31536F3DC1BD4780E87B7780DD42208FE25413"
ci_key = "A7B7385963250149C836389BC78631AA6893C46C"
signed_by = ["@scott", "@haystack.prime"]

[authorization]
# Trust is GPG web-of-trust, not platform accounts.
# T2 requires GPG on GitHub. T1 requires cross-signature by T0 holder.
github_gpg_required = true
trust_tiers = ["T0:dual-signed", "T1:cross-signed", "T2:gpg-not-cross-signed", "T3:anonymous"]

[distribution]
mirrors = [
  "https://github.com/os-tack/ostk.ai/releases",
  "https://ostk.ai/releases"
]
verify_signature = true
tarball_pattern = "ostk-{version}-{target}.tar.gz"

[kernel]
boot_mode = "embedded-first"
daemon_lifecycle = "tui-owned"
laws = [
  "invisible-write",
  "ephemeral",
  "filesystem",
  "OCC",
  "invisible-infra"
]

[onboarding]
# install.sh runs the full ceremony
steps = [
  "binary-install",       # download + GPG verify
  "environment-detect",   # git repo, GPG key, identity
  "humanfile-create",     # governance document
  "os-init",              # .ostk/ with isolation + default pin
  "import-offer"          # git history → audit trail
]

[pins]
# Default pin shipped with every OS installation
[pins.default]
read = [".ostk/", ".language"]
write = [".ostk/store/default/"]
execute = "shell(readonly)"
deny = ["write-kernel", "modify-governance"]

[features]
tui = true
agents = true
audit = true
digest = true
embeddings = false
